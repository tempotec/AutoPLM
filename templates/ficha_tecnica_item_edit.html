<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Item - Ficha Tecnica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0a0e1a;
            color: #e5e7eb;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background-color: #0f1420;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1e293b;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            margin-bottom: 32px;
        }

        .logo img {
            height: 32px;
            width: auto;
            object-fit: contain;
        }

        .logo span {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: #1e293b;
            color: #e5e7eb;
        }

        .nav-item.active {
            background-color: #2563eb;
            color: #ffffff;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-top: 1px solid #1e293b;
            margin-top: 16px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #e5e7eb;
        }

        .user-role {
            font-size: 12px;
            color: #64748b;
        }

        .main-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            margin-left: 240px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }

        .page-subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 8px;
        }

        .btn {
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-secondary {
            background-color: #1f2937;
            color: #e5e7eb;
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            background-color: #374151;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            color: #cbd5f5;
        }

        input[type="text"] {
            padding: 10px 12px;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e5e7eb;
            font-size: 13px;
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
                <span>StyleFlow</span>
            </div>

            <nav class="nav-menu">
                <a href="{{ url_for('dashboard.index') }}" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Painel</span>
                </a>
                <a href="{{ url_for('fichas.tabela', ficha_id=ficha.id) }}" class="nav-item active">
                    <i class="fas fa-table"></i>
                    <span>Ficha Tecnica</span>
                </a>
            </nav>

            <div style="margin-top: auto;">
                <a href="{{ url_for('settings.index') }}" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Configuracoes</span>
                </a>
                <a href="{{ url_for('auth.logout') }}" class="nav-item" style="color: #f87171;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </a>

                <div class="user-profile">
                    <div class="user-avatar">
                        {{ current_user.username[0].upper() }}
                    </div>
                    <div class="user-info">
                        <div class="user-name">{{ current_user.username }}</div>
                        <div class="user-role">{% if current_user.is_admin %}Admin{% else %}Estilista{% endif %}</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div class="header-top">
                    <div>
                        <h1 class="page-title">Editar Item</h1>
                        <p class="page-subtitle">Atualize os dados desta linha da planilha.</p>
                    </div>
                    <a href="{{ url_for('fichas.tabela', ficha_id=ficha.id) }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i>
                        Voltar
                    </a>
                </div>
            </header>

            <section class="card">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="form-grid">
                        {% for field in fields %}
                        <div class="form-group">
                            <label for="field_{{ field.name }}">{{ field.label }}</label>
                            <input type="text" id="field_{{ field.name }}" name="field_{{ field.name }}" value="{{ field.value }}">
                        </div>
                        {% endfor %}
                    </div>
                    <div class="action-row">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i>
                            Salvar
                        </button>
                        <a href="{{ url_for('fichas.tabela', ficha_id=ficha.id) }}" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
